<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SAP CO Study Journal</title>
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="章ナビゲーション">
        <div class="brand-block">
          <p class="eyebrow">SAP S/4HANA CO</p>
          <h1>SAP CO Study Journal</h1>
          <p class="brand-copy">Cost CenterとInternal Orderを読み解く学習支援サイト</p>
        </div>

        <div class="search-box">
          <label for="globalSearch">検索</label>
          <input id="globalSearch" type="search" placeholder="例: ACDOCA, settlement, budget">
        </div>

        <nav class="chapter-nav" id="chapterNav" aria-label="章一覧"></nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Study Article</p>
            <h2 id="currentChapterTitle">読み込み中...</h2>
          </div>
          <div class="topbar-actions">
            <button class="icon-button" type="button" id="prevChapter" title="前の章" aria-label="前の章">‹</button>
            <button class="icon-button" type="button" id="nextChapter" title="次の章" aria-label="次の章">›</button>
            <button class="primary-button" type="button" id="markComplete">読了にする</button>
          </div>
        </header>

        <nav class="content-tabs" aria-label="学習コンテンツ切り替え">
          <button type="button" class="tab-btn is-active" data-tab="lesson">テキストを読む</button>
          <button type="button" class="tab-btn" data-tab="quiz">確認問題 (<span id="quizTabCount">0</span>)</button>
          <button type="button" class="tab-btn" data-tab="glossary">用語集</button>
        </nav>

        <section class="search-results" id="searchResults" aria-live="polite"></section>

        <section class="course-layout tab-content is-active" id="tab-lesson">
          <article class="lesson-panel" id="lessonPanel"></article>
          <aside class="study-panel">
            <section class="panel-block">
              <h3>学習進捗</h3>
              <div class="progress-meter" aria-label="学習進捗">
                <span id="progressBar"></span>
              </div>
              <p id="progressText" class="muted-text">0 / 10 章</p>
            </section>

            <section class="panel-block glossary-preview">
              <h3>関連用語</h3>
              <div id="glossaryPreview"></div>
            </section>
          </aside>
        </section>

        <section class="quiz-section tab-content" id="tab-quiz"></section>

        <section class="glossary-section tab-content" id="tab-glossary">
          <div class="section-heading-row">
            <div>
              <p class="eyebrow">Glossary</p>
              <h2>用語集</h2>
            </div>
            <select id="glossaryFilter" aria-label="用語集の章フィルター">
              <option value="all">全章</option>
            </select>
          </div>
          <div class="glossary-grid" id="glossaryGrid"></div>
        </section>
      </main>
    </div>

    <script src="assets/data/course-data.js"></script>
    <script src="assets/data/beginner-notes-data.js"></script>
    <script src="assets/data/glossary-data.js"></script>
    <script src="assets/data/glossary-extra-data.js"></script>
    <script src="assets/data/quiz-data.js"></script>
    <script src="assets/data/review-quiz-data.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
